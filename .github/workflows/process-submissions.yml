name: Process Community Submissions

on:
  push:
    branches:
      - main
    paths:
      - "submissions/*.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Process pending submissions
        run: node scripts/process-submissions.mjs

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/community-data.json submissions/
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore(data): approve community submissions [skip ci]"
            git push
          fi

      - name: Deploy to Vercel
        if: success()
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_LAclj7rfB9A7RsR1NcPDOND3
          VERCEL_PROJECT_ID: prj_89KCsP03CvXLU3Sp5szMXvkL9Xjd
        run: |
          npm install -g vercel@latest
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
